<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Side Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; background: #0f0f0f; color: #fff; font-family: -apple-system, 'Segoe UI', Roboto, sans-serif; }
 #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
            min-height: 44px;
        }
        #toolbar span { font-size: 13px; font-weight: 500; color: #888; }
        #extractBtn {
            padding: 6px 14px;
            background: #00ffaa;
            color: #0f0f0f;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #extractBtn:hover { opacity: 0.85; }
        #extractBtn:disabled { opacity: 0.5; cursor: not-allowed; }
        #status { font-size: 12px; color: #666; margin-left: auto; }
        #deepseek-frame { width: 100%; height: calc(100% - 44px); border: none; }
    </style>
</head>
<body>
    <div id="toolbar">
        <span>🧠 AI</span>
        <button id="extractBtn">📝 Извлечь транскрипт</button>
        <span id="status"></span>
    </div>
    <iframe id="deepseek-frame" src="https://chat.deepseek.com/"></iframe>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('extractBtn');
            const status = document.getElementById('status');
            const iframe = document.getElementById('deepseek-frame');

            function setStatus(text, isError = false) {
                status.textContent = text;
                status.style.color = isError ? '#ff6b6b' : '#888';
            }

            btn.addEventListener('click', function() {
                if (typeof chrome === 'undefined' || !chrome.tabs) {
                    setStatus('❌ Ошибка: нет доступа к API', true);
                    return;
                }

                setStatus('⏳ Проверка...');
                btn.disabled = true;

                chrome.tabs.query({ active: true, currentWindow: true }, function(tabs) {
                    const tab = tabs[0];
                    if (!tab || !tab.url.includes('youtube.com/watch')) {
                        setStatus('❌ Откройте видео на YouTube', true);
                        btn.disabled = false;
                        return;
                    }

                    const urlParams = new URLSearchParams(new URL(tab.url).search);
                    const videoId = urlParams.get('v');
                    if (!videoId) {
                        setStatus('❌ Не найден ID видео', true);
                        btn.disabled = false;
                        return;
                    }

                    setStatus('⏳ Загрузка транскрипта...');

                    chrome.runtime.sendMessage(
                        { action: 'getTranscript', videoId: videoId },
                        function(response) {
                            btn.disabled = false;

                            if (chrome.runtime.lastError) {
                                setStatus('❌ Ошибка связи', true);
                                return;
                            }

                            if (response && response.success) {
                                const transcript = response.transcript;
                                if (iframe && iframe.contentWindow) {
                                    iframe.contentWindow.postMessage({
                                        type: 'INSERT_TRANSCRIPT',
                                        text: transcript
                                    }, 'https://chat.deepseek.com');
                                    setStatus('✅ Отправлено!');
                                } else {
                                    setStatus('⚠️ iframe не найден', true);
                                }
                            } else {
 setStatus('❌ ' + (response?.error || 'Ошибка'), true);
                            }
                        }
                    );
                });
            });
        });
    </script>
</body>
</html>
